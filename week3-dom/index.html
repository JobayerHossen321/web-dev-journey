<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Revealer</title>
<style>
  #secretText {
    display: none;
  }
  /* CSS rule using class selector to hide the new items */
  .hidden-item {
    display: none;
  }
</style>
  
</head>
<body>
  <h1>Welcome to the Secret Revealer</h1>
  
  <p id="secretText">The password is pineapple.</p>
  <button id="revealBtn">Reveal Secret</button>

  <hr> <p class="hidden-item">Placeholder secret number one.</p>
  <p class="hidden-item">Placeholder secret number two.</p>
  <p class="hidden-item">Placeholder secret number three.</p>

  <button id="revealAllBtn">Reveal All</button>

  <script src="script.js"></script>
</body>
</html>
